<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>TNPSC OCR → JSON</title>

  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #f5f5f5;
    }

    input, button {
      margin-top: 10px;
    }

    img {
      max-width: 300px;
      margin-top: 10px;
      border: 1px solid #ccc;
    }

    textarea {
      width: 100%;
      height: 220px;
      margin-top: 10px;
    }

    button {
      padding: 10px 15px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h2>📄 TNPSC Image → JSON Converter</h2>

<input type="file" id="fileInput" accept="image/*" />
<br>

<img id="preview" />

<br>

<button onclick="runOCR()">Convert to JSON</button>

<h3>Output:</h3>
<textarea id="output"></textarea>

<script>
let imageFile;

// file select
document.getElementById("fileInput").addEventListener("change", function(e){
  imageFile = e.target.files[0];
  document.getElementById("preview").src = URL.createObjectURL(imageFile);
});

// OCR function
async function runOCR() {
  if (!imageFile) {
    alert("Please upload image first");
    return;
  }

  document.getElementById("output").value = "Processing...";

  const result = await Tesseract.recognize(
    imageFile,
    "tam+eng",
    {
      logger: m => console.log(m)
    }
  );
let text = result.data.text;

// CLEAN
text = text
  .replace(/\n/g, " ")
  .replace(/\s+/g, " ")
  .trim();

// FIND QUESTION (first long sentence)
let sentences = text.split("?");

let question = (sentences[0] || text).trim();

// FIND OPTIONS using loose match
let optionRegex = /([A-D])[\)\.\-]\s*([^A-D]*)/g;

let matches = [...text.matchAll(optionRegex)];

let options = matches.map(m => m[2].trim());

// fallback
while (options.length < 4) {
  options.push("");
}

const json = {
  c: "General Tamil",
  q: question,
  o: [
    options[0],
    options[1],
    options[2],
    options[3]
  ],
  a: 1,
  e: "NA"
};

document.getElementById("output").value =
  JSON.stringify(json, null, 2);
  
}
</script>

</body>
</html>
