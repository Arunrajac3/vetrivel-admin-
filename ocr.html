<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>OCR to JSON</title>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <style>
    body { font-family: Arial; padding: 20px; }
    img { max-width: 300px; margin-top: 10px; }
    textarea { width: 100%; height: 200px; }
  </style>
</head>

<body>

<h2>TNPSC Image → JSON</h2>

<input type="file" id="fileInput" accept="image/*" />
<br><br>

<img id="preview" />
<br><br>

<button onclick="runOCR()">Convert</button>

<h3>Output:</h3>
<textarea id="output"></textarea>

<script>
let imageFile;

document.getElementById("fileInput").addEventListener("change", function(e){
  imageFile = e.target.files[0];
  document.getElementById("preview").src = URL.createObjectURL(imageFile);
});

async function runOCR() {
  if (!imageFile) {
    alert("Upload image first");
    return;
  }

  document.getElementById("output").value = "Processing...";

  const result = await Tesseract.recognize(
    imageFile,
    "tam+eng",
    {
      logger: m => console.log(m)
    }
  );

  let text = result.data.text;

  // CLEAN TEXT
  text = text.replace(/\r/g, "").replace(/\s+/g, " ").trim();

  // SPLIT LOGIC (safe version)
  let parts = text.split(/(?=[A-D]\))/g);

  let question = parts[0] || "";
  let options = parts.slice(1, 5);

  const json = {
    c: "TNPSC",
    q: question.trim(),
    o: options.length ? options : ["A", "B", "C", "D"],
    a: 0,
    e: "NA"
  };

  document.getElementById("output").value =
    JSON.stringify(json, null, 2);
}
</script>

</body>
</html>
