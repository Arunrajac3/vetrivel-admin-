<!DOCTYPE html>
<html lang="ta">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vetrivel TNPSC — வேலுடன் வெற்றியை நோக்கி</title>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
  :root{
    --bg:#0b1220; --card:#121b2e; --card2:#0f1726; --border:#22304a;
    --text:#e8edf7; --muted:#93a1bb; --blue:#3b82f6; --blue2:#2563eb;
    --green:#22c55e; --red:#ef4444; --yellow:#eab308; --gold:#f5b942;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Segoe UI',Tahoma,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
  .wrap{max-width:760px;margin:0 auto;padding:18px 16px 60px;}

  /* ===== Header ===== */
  .hero{text-align:center;padding:20px 10px 10px;}
  .hero .vel{font-size:2.6rem;}
  .hero h1{margin:6px 0 2px;font-size:1.5rem;background:linear-gradient(90deg,var(--gold),#fff);-webkit-background-clip:text;background-clip:text;color:transparent;}
  .hero .tagline{color:var(--muted);font-size:.85rem;margin-bottom:14px;}

  .btn{background:var(--blue);color:#fff;border:none;padding:11px 18px;border-radius:12px;font-size:.92rem;cursor:pointer;font-weight:700;}
  .btn:hover{background:var(--blue2);}
  .btn.secondary{background:var(--card2);border:1px solid var(--border);color:var(--text);}
  .btn.green{background:var(--green);}
  .btn.full{width:100%;}
  .btn:disabled{opacity:.5;cursor:not-allowed;}

  /* ===== Subject grid ===== */
  .section-title{font-size:1rem;font-weight:700;margin:18px 0 10px;color:var(--gold);}
  .subj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;}
  .subj-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;text-align:center;cursor:pointer;transition:.15s;}
  .subj-card:hover{border-color:var(--blue);transform:translateY(-2px);}
  .subj-card .emoji{font-size:1.7rem;margin-bottom:6px;}
  .subj-card .name{font-weight:700;font-size:.88rem;}
  .subj-card .count{font-size:.72rem;color:var(--muted);margin-top:3px;}

  /* ===== Class chips ===== */
  .chip-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;}
  .chip{background:var(--card2);border:1px solid var(--border);border-radius:20px;padding:9px 16px;font-size:.85rem;cursor:pointer;font-weight:600;}
  .chip.active{background:var(--blue);border-color:var(--blue);color:#fff;}
  .chip .qn{font-size:.7rem;color:var(--muted);margin-left:4px;}
  .chip.active .qn{color:#dbeafe;}

  .card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px;margin-bottom:16px;}
  .back-btn{background:none;border:none;color:var(--muted);font-size:.85rem;cursor:pointer;margin-bottom:10px;padding:6px 0;}
  .back-btn:hover{color:var(--text);}

  /* ===== Quiz screen ===== */
  #quiz-screen{display:none;}
  .quiz-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;font-size:.85rem;color:var(--muted);}
  .progress-bar{height:6px;background:var(--card2);border-radius:6px;overflow:hidden;margin-bottom:18px;}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--gold));transition:.3s;}
  .q-cat{font-size:.74rem;color:var(--gold);font-weight:700;margin-bottom:6px;}
  .q-text{font-size:1.08rem;line-height:1.5;margin-bottom:18px;}
  .opt{display:block;width:100%;text-align:left;background:var(--card2);border:1.5px solid var(--border);border-radius:12px;padding:13px 16px;margin-bottom:10px;font-size:.92rem;color:var(--text);cursor:pointer;}
  .opt:hover{border-color:var(--blue);}
  .opt.selected{border-color:var(--blue);background:rgba(59,130,246,.12);}
  .opt.correct{border-color:var(--green);background:rgba(34,197,94,.15);}
  .opt.wrong{border-color:var(--red);background:rgba(239,68,68,.15);}
  .explain-box{background:var(--card2);border-left:3px solid var(--gold);border-radius:8px;padding:12px 14px;margin-top:12px;font-size:.85rem;color:var(--muted);display:none;}
  .quiz-actions{display:flex;gap:10px;margin-top:18px;}

  /* ===== Result screen ===== */
  #result-screen{display:none;text-align:center;}
  .result-emoji{font-size:3.4rem;}
  .result-score{font-size:2.2rem;font-weight:800;margin:8px 0;}
  .result-sub{color:var(--muted);margin-bottom:20px;}
  .result-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px;}
  .result-stats .stat{background:var(--card2);border-radius:12px;padding:12px;}
  .result-stats .stat .n{font-size:1.3rem;font-weight:800;}
  .result-stats .stat .l{font-size:.7rem;color:var(--muted);}

  .loading{text-align:center;padding:50px 10px;color:var(--muted);}
  .empty{text-align:center;color:var(--muted);padding:40px 10px;font-size:.9rem;}
  #toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--border);
    padding:12px 22px;border-radius:12px;display:none;z-index:999;font-size:.88rem;}
  #toast.show{display:block;}
</style>
</head>
<body>

<div class="wrap">
  <div class="hero">
    <div class="vel">🔱</div>
    <h1>Vetrivel TNPSC</h1>
    <div class="tagline">வேலுடன் வெற்றியை நோக்கி</div>
  </div>

  <!-- ===== HOME SCREEN: Subject selection ===== -->
  <div id="home-screen">
    <div id="subj-loading" class="loading">பாடங்கள் ஏற்றப்படுகிறது...</div>
    <div id="subj-grid" class="subj-grid"></div>
    <div id="subj-empty" class="empty" style="display:none;">இன்னும் வினாக்கள் சேர்க்கப்படவில்லை. விரைவில் வரும்! 🚀</div>
  </div>

  <!-- ===== CLASS SCREEN: pick class/year within subject ===== -->
  <div id="class-screen" style="display:none;">
    <button class="back-btn" id="class-back-btn">‹ பாடங்களுக்கு திரும்பு</button>
    <div class="section-title" id="class-subject-title"></div>
    <div id="class-loading" class="loading" style="display:none;">ஏற்றப்படுகிறது...</div>
    <div class="chip-row" id="class-chip-row"></div>
  </div>

  <!-- ===== QUIZ SCREEN ===== -->
  <div id="quiz-screen">
    <div class="card">
      <div class="quiz-top">
        <span id="quiz-title-label"></span>
        <span id="quiz-progress-label"></span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
      <div class="q-cat" id="q-cat"></div>
      <div class="q-text" id="q-text"></div>
      <div id="opts-container"></div>
      <div class="explain-box" id="explain-box"></div>
      <div class="quiz-actions">
        <button class="btn secondary" id="quit-quiz-btn">✕ வெளியேறு</button>
        <button class="btn full" id="next-q-btn" disabled>அடுத்தது ›</button>
      </div>
    </div>
  </div>

  <!-- ===== RESULT SCREEN ===== -->
  <div id="result-screen">
    <div class="card">
      <div class="result-emoji" id="res-emoji">🏆</div>
      <div class="result-score" id="res-score"></div>
      <div class="result-sub" id="res-sub"></div>
      <div class="result-stats">
        <div class="stat"><div class="n" id="res-correct" style="color:var(--green)"></div><div class="l">சரியானவை</div></div>
        <div class="stat"><div class="n" id="res-wrong" style="color:var(--red)"></div><div class="l">தவறானவை</div></div>
        <div class="stat"><div class="n" id="res-total"></div><div class="l">மொத்தம்</div></div>
      </div>
      <button class="btn full green" id="retry-btn">🔄 மீண்டும் முயற்சி</button>
      <button class="btn full secondary" id="home-btn" style="margin-top:10px;">🏠 முகப்புக்கு திரும்பு</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ============================================================
// FIREBASE CONFIG
// ============================================================
const firebaseConfig = {
  apiKey: "AIzaSyDRLa2a6UMRrPRlYxOexpUoFfILOF_ufUU",
  authDomain: "vetrivel-tnpsc.firebaseapp.com",
  projectId: "vetrivel-tnpsc",
  storageBucket: "vetrivel-tnpsc.firebasestorage.app",
  messagingSenderId: "750054070928",
  appId: "1:750054070928:web:fc8016b63d844bf38a5615",
  measurementId: "G-Z8YL3F7T72"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const QUESTIONS_COLLECTION = "questions";

const SUBJECT_META = {
  tamil:            {label:"தமிழ்", emoji:"📚"},
  special:          {label:"சிறப்புத் தமிழ்", emoji:"✨"},
  history:          {label:"வரலாறு", emoji:"🏛️"},
  geo:              {label:"புவியியல்", emoji:"🌍"},
  eco:              {label:"பொருளாதாரம்", emoji:"💰"},
  polity:           {label:"அரசியல்", emoji:"⚖️"},
  aptitude:         {label:"Aptitude", emoji:"🧮"},
  pyq:              {label:"PYQ", emoji:"📜"},
  science:          {label:"பொது அறிவியல்", emoji:"🔬"},
  currentaffairs:   {label:"நடப்பு நிகழ்வுகள்", emoji:"📰"}
};

function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show';
  setTimeout(()=>{ t.className=''; }, 3000);
}

// ============================================================
// SCREEN MANAGEMENT
// ============================================================
function showScreen(name){
  document.getElementById('home-screen').style.display = name==='home' ? 'block' : 'none';
  document.getElementById('class-screen').style.display = name==='class' ? 'block' : 'none';
  document.getElementById('quiz-screen').style.display = name==='quiz' ? 'block' : 'none';
  document.getElementById('result-screen').style.display = name==='result' ? 'block' : 'none';
  window.scrollTo(0,0);
}

// ============================================================
// HOME: Load subjects with counts
// ============================================================
let allQuestionsCache = [];

async function loadSubjects(){
  try{
    const snap = await db.collection(QUESTIONS_COLLECTION).where('active','==',true).get();
    allQuestionsCache = [];
    snap.forEach(doc => allQuestionsCache.push({id:doc.id, ...doc.data()}));

    document.getElementById('subj-loading').style.display = 'none';

    if(allQuestionsCache.length === 0){
      document.getElementById('subj-empty').style.display = 'block';
      return;
    }

    const subjectCounts = {};
    allQuestionsCache.forEach(q => {
      subjectCounts[q.subject] = (subjectCounts[q.subject]||0) + 1;
    });

    const grid = document.getElementById('subj-grid');
    grid.innerHTML = '';
    Object.keys(subjectCounts).forEach(subj => {
      const meta = SUBJECT_META[subj] || {label:subj, emoji:'📘'};
      const card = document.createElement('div');
      card.className = 'subj-card';
      card.innerHTML = `<div class="emoji">${meta.emoji}</div><div class="name">${meta.label}</div><div class="count">${subjectCounts[subj]} வினாக்கள்</div>`;
      card.addEventListener('click', () => openSubject(subj));
      grid.appendChild(card);
    });
  }catch(e){
    document.getElementById('subj-loading').textContent = 'பிழை: ' + e.message;
    console.error(e);
  }
}

// ============================================================
// CLASS SCREEN: Show classes within a subject
// ============================================================
let currentSubject = null;

function openSubject(subj){
  currentSubject = subj;
  const meta = SUBJECT_META[subj] || {label:subj, emoji:'📘'};
  document.getElementById('class-subject-title').textContent = `${meta.emoji} ${meta.label} — வகுப்பு / ஆண்டு தேர்வு செய்யவும்`;

  const subjectQuestions = allQuestionsCache.filter(q => q.subject === subj);
  const classCounts = {};
  subjectQuestions.forEach(q => {
    const k = q.class || 'பொது';
    classCounts[k] = (classCounts[k]||0) + 1;
  });

  const chipRow = document.getElementById('class-chip-row');
  chipRow.innerHTML = '';
  Object.keys(classCounts).sort((a,b)=> (isNaN(a)||isNaN(b)) ? a.localeCompare(b) : a-b ).forEach(klass => {
    const chip = document.createElement('div');
    chip.className = 'chip';
    chip.innerHTML = `${klass} <span class="qn">(${classCounts[klass]})</span>`;
    chip.addEventListener('click', () => startQuiz(subj, klass));
    chipRow.appendChild(chip);
  });

  showScreen('class');
}

document.getElementById('class-back-btn').addEventListener('click', () => showScreen('home'));

// ============================================================
// QUIZ LOGIC
// ============================================================
let quizQuestions = [];
let currentQIndex = 0;
let score = 0;
let wrongCount = 0;
let answeredCurrent = false;

function shuffleArray(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function startQuiz(subj, klass){
  const pool = allQuestionsCache.filter(q => q.subject===subj && (q.class||'பொது')===klass);
  if(pool.length === 0){ toast('இந்த பிரிவில் வினாக்கள் இல்லை.'); return; }

  quizQuestions = shuffleArray(pool);
  currentQIndex = 0;
  score = 0;
  wrongCount = 0;

  const meta = SUBJECT_META[subj] || {label:subj, emoji:'📘'};
  document.getElementById('quiz-title-label').textContent = `${meta.emoji} ${meta.label} — ${klass}`;

  showScreen('quiz');
  renderQuestion();
}

function renderQuestion(){
  answeredCurrent = false;
  const q = quizQuestions[currentQIndex];
  document.getElementById('quiz-progress-label').textContent = `${currentQIndex+1} / ${quizQuestions.length}`;
  document.getElementById('progress-fill').style.width = ((currentQIndex)/quizQuestions.length*100) + '%';
  document.getElementById('q-cat').textContent = q.topic || '';
  document.getElementById('q-text').textContent = q.questionText;
  document.getElementById('explain-box').style.display = 'none';
  document.getElementById('explain-box').textContent = '';
  document.getElementById('next-q-btn').disabled = true;
  document.getElementById('next-q-btn').textContent = currentQIndex === quizQuestions.length-1 ? 'முடி ✓' : 'அடுத்தது ›';

  const optsContainer = document.getElementById('opts-container');
  optsContainer.innerHTML = '';

  const options = q.options || [];
  options.forEach((optText, idx) => {
    const optEl = document.createElement('button');
    optEl.className = 'opt';
    optEl.textContent = optText;
    optEl.addEventListener('click', () => selectOption(idx));
    optsContainer.appendChild(optEl);
  });
}

function selectOption(selectedIdx){
  if(answeredCurrent) return;
  answeredCurrent = true;

  const q = quizQuestions[currentQIndex];
  const correctIdx = q.correctAnswerIndex;
  const optEls = document.querySelectorAll('#opts-container .opt');

  optEls.forEach((el, idx) => {
    if(idx === correctIdx) el.classList.add('correct');
    else if(idx === selectedIdx) el.classList.add('wrong');
  });

  if(selectedIdx === correctIdx){
    score++;
  } else {
    wrongCount++;
  }

  if(q.explanation){
    const box = document.getElementById('explain-box');
    box.textContent = '💡 ' + q.explanation;
    box.style.display = 'block';
  }

  document.getElementById('next-q-btn').disabled = false;
}

document.getElementById('next-q-btn').addEventListener('click', () => {
  if(currentQIndex < quizQuestions.length - 1){
    currentQIndex++;
    renderQuestion();
  } else {
    finishQuiz();
  }
});

document.getElementById('quit-quiz-btn').addEventListener('click', () => {
  if(confirm('Quiz-ஐ விட்டு வெளியேறவா? முன்னேற்றம் சேமிக்கப்படாது.')){
    showScreen('home');
  }
});

function finishQuiz(){
  document.getElementById('progress-fill').style.width = '100%';
  const total = quizQuestions.length;
  const percent = Math.round((score/total)*100);

  let emoji = '🏆', subMsg = 'அருமை!';
  if(percent >= 80){ emoji='🏆'; subMsg='அற்புதம்! TNPSC வெற்றி உறுதி!'; }
  else if(percent >= 60){ emoji='👍'; subMsg='நல்லது! இன்னும் கொஞ்சம் பயிற்சி!'; }
  else if(percent >= 40){ emoji='💪'; subMsg='தொடர்ந்து பயிற்சி செய்! முன்னேறுவாய்!'; }
  else{ emoji='📖'; subMsg='மீண்டும் படித்து முயற்சி செய்!'; }

  document.getElementById('res-emoji').textContent = emoji;
  document.getElementById('res-score').textContent = percent + '%';
  document.getElementById('res-sub').textContent = subMsg;
  document.getElementById('res-correct').textContent = score;
  document.getElementById('res-wrong').textContent = wrongCount;
  document.getElementById('res-total').textContent = total;

  showScreen('result');
}

document.getElementById('retry-btn').addEventListener('click', () => {
  const q = quizQuestions[0];
  startQuiz(q.subject, q.class);
});

document.getElementById('home-btn').addEventListener('click', () => {
  showScreen('home');
});

// ============================================================
// INIT
// ============================================================
loadSubjects();
showScreen('home');
</script>
</body>
</html>
